name: Build Buschgirls Manifest

on:
  push:
    paths:
      - "img/buschgirls/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build manifest
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const root = "img/buschgirls";
          const allowed = new Set([".jpg", ".jpeg", ".png", ".webp"]);

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            let out = [];

            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                out = out.concat(walk(fullPath));
                continue;
              }

              const ext = path.extname(entry.name).toLowerCase();
              if (!allowed.has(ext)) continue;
              if (entry.name.toLowerCase() === "manifest.json") continue;

              out.push(fullPath.replace(/\\/g, "/"));
            }

            return out;
          }

          const files = walk(root)
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

          fs.writeFileSync(
            `${root}/manifest.json`,
            JSON.stringify(files, null, 2) + "\n"
          );
          EOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/buschgirls/manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "auto update buschgirls manifest"
          git push
