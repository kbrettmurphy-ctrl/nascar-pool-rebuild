name: Build Buschgirls Manifest

on:
  push:
    paths:
      - "img/buschgirls/*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build manifest
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = "img/buschgirls";

          const files = fs.readdirSync(path)
            .filter(f => /\.(jpg|jpeg|png|webp)$/i.test(f))
            .map(f => `img/buschgirls/${f}`);

          fs.writeFileSync(
            `${path}/manifest.json`,
            JSON.stringify(files, null, 2)
          );
          EOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add img/buschgirls/manifest.json
          git commit -m "auto update buschgirls manifest" || echo "No changes"
          git push