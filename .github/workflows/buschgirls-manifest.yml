name: Build Buschgirls Manifest

on:
  push:
    paths:
      - "img/buschgirls/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build manifest
        run: npm run build:buschgirls

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/buschgirls/manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "auto update buschgirls manifest"
          git push
