<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASCAR Pool Rebuild</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #111;
      color: #f5f5f5;
    }

    .card {
      max-width: 800px;
      margin: 60px auto;
      padding: 24px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #1b1b1b;
    }

    h1 {
      margin-top: 0;
    }

    .small {
      color: #bbb;
    }

    .error {
      color: #ff8a8a;
      white-space: pre-wrap;
    }

    .assignment {
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NASCAR Pool Rebuild</h1>
    <p>The new app skeleton is live.</p>
    <p class="small">Phase 3: Reading resolved assignments from Supabase.</p>

    <h2>Resolved Assignments</h2>
    <div id="status">Loading assignments...</div>
    <div id="results"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://adhqiqniqxwfcruwrlfh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_6cZQmGc_Ceq_XfjfrxcdgA_YeAF5Pp8";

    async function loadAssignments() {
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/resolved_assignments?select=*&order=player_name.asc`,
          {
            method: "GET",
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const data = await response.json();

        if (!data || data.length === 0) {
          status.textContent = "No assignments found.";
          return;
        }

        status.textContent = "";

        results.innerHTML = data.map(row => `
          <div class="assignment">
            <strong>${row.player_name}</strong><br>
            Race: ${row.race_name}<br>
            Slot: ${row.assignment_slot}<br>
            Position: ${row.qualifying_position}<br>
            Driver: ${row.driver_name ?? "Not resolved yet"}${row.car_number ? ` (#${row.car_number})` : ""}
          </div>
        `).join("");
      } catch (err) {
        console.error(err);
        status.innerHTML = `<div class="error">Error: ${err.message || err}</div>`;
      }
    }

    loadAssignments();
  </script>
</body>
</html>
