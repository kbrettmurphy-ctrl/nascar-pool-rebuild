<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASCAR Pool Rebuild</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #111;
      color: #f5f5f5;
    }

    .card {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #1b1b1b;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .small {
      color: #bbb;
    }

    .error {
      color: #ff8a8a;
      white-space: pre-wrap;
    }

    .race-block {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }

    .player-block {
      margin-top: 16px;
      padding: 14px;
      background: #222;
      border-radius: 10px;
      border: 1px solid #333;
    }

    .assignment-line {
      margin-top: 8px;
      color: #ddd;
    }

    .muted {
      color: #aaa;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  
  <div class="card">
    <h1>NASCAR Pool Rebuild</h1>
    <p class="small">Resolved race assignments powered by Supabase.</p>
    <label for="raceSelect">Select Race:</label>
    <select id="raceSelect"></select>
    <div id="status">Loading assignments...</div>
    <div id="results"></div>
  </div>

  <script>

const SUPABASE_URL = "https://adhqiqniqxwfcruwrlfh.supabase.co";
const SUPABASE_KEY = "sb_publishable_6cZQmGc_Ceq_XfjfrxcdgA_YeAF5Pp8";

async function loadRaces() {

  const response = await fetch(
    `${SUPABASE_URL}/rest/v1/races?select=id,race_name,race_number,season_year&order=race_number.asc`,
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const races = await response.json();

  const select = document.getElementById("raceSelect");

  races.forEach(race => {

    const option = document.createElement("option");

    option.value = race.id;
    option.textContent = `Race ${race.race_number}: ${race.race_name}`;

    select.appendChild(option);

  });

  if (races.length > 0) {
    loadAssignments(races[0].id);
  }

}

async function loadAssignments(raceId) {

  const status = document.getElementById("status");
  const results = document.getElementById("results");

  status.textContent = "Loading assignments...";

  try {

    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/resolved_assignments?race_id=eq.${raceId}&select=*&order=player_name.asc,assignment_slot.asc`,
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const data = await response.json();

    if (!data || data.length === 0) {
      status.textContent = "No assignments found.";
      results.innerHTML = "";
      return;
    }

    status.textContent = "";

    const players = {};

    data.forEach(row => {

      if (!players[row.player_name]) {
        players[row.player_name] = [];
      }

      players[row.player_name].push(row);

    });

    const html = Object.entries(players).map(([player, assignments]) => {

      assignments.sort((a,b) => a.assignment_slot - b.assignment_slot);

      return `
        <div class="player-block">
          <h3>${player}</h3>
          ${assignments.map(a => `
            <div class="assignment-line">
              <strong>Driver ${a.assignment_slot}:</strong>
              ${a.driver_name ?? "Ain't no qualifying yet, Dick Trickle."}${a.car_number ? ` (#${a.car_number})` : ""}
              <div class="muted">
                Assigned qualifying position: ${a.qualifying_position}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }).join("");

    results.innerHTML = html;

  } catch(err) {

    status.innerHTML = `<div class="error">${err.message}</div>`;

  }

}

document.addEventListener("DOMContentLoaded", () => {

  loadRaces();

  document.getElementById("raceSelect").addEventListener("change", (e) => {

    loadAssignments(e.target.value);

  });

});

</script>
</body>
</html>
