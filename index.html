<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASCAR Pool Rebuild</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #111;
      color: #f5f5f5;
    }

    .card {
      max-width: 800px;
      margin: 60px auto;
      padding: 24px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #1b1b1b;
    }

    h1 {
      margin-top: 0;
    }

    .small {
      color: #bbb;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin: 8px 0;
    }

    .error {
      color: #ff8a8a;
      white-space: pre-wrap;
    }

  </style>
</head>
<body>  
  <div class="card">
    <h1>NASCAR Pool Rebuild</h1>
    <p>The new app skeleton is live.</p>
    <p class="small">Phase 2: Reading players from Supabase.</p>

    <h2>Players</h2>
    <div id="status">Loading players...</div>
    <ul id="playerList"></ul>
  </div>
  <div id="results"></div>

  <script>
    const SUPABASE_URL = "https://adhqiqniqxwfcruwrlfh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_6cZQmGc_Ceq_XfjfrxcdgA_YeAF5Pp8";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    async function loadAssignments() {

      const { data, error } = await supabase
        .from('resolved_assignments')
        .select('*')
        .order('player_name')

      if (error) {
        console.error(error)
        return
      }

      const container = document.getElementById("results")

      container.innerHTML = data.map(row => `
        <div style="margin-bottom:10px">
          <strong>${row.player_name}</strong><br>
          Race: ${row.race_name}<br>
          Slot: ${row.assignment_slot}<br>
          Position: ${row.qualifying_position}<br>
          Driver: ${row.driver_name} (#${row.car_number})
        </div>
      `).join("")

    }

    loadAssignments()

  </script>
</body>
</html>
