<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NASCAR Pool Rebuild</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:40px;
  background:#111;
  color:#f5f5f5;
}

.card{
  max-width:900px;
  margin:40px auto;
  padding:24px;
  border:1px solid #444;
  border-radius:12px;
  background:#1b1b1b;
}

h1,h2,h3{
  margin-top:0;
}

.small{
  color:#bbb;
}

.error{
  color:#ff8a8a;
  white-space:pre-wrap;
}

.controls{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  margin:18px 0 20px;
}

select,button{
  font:inherit;
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #444;
}

select{
  background:#222;
  color:#f5f5f5;
  min-width:200px;
}

button{
  background:#2d5ea8;
  color:white;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.player-block{
  margin-top:16px;
  padding:14px;
  background:#222;
  border-radius:10px;
  border:1px solid #333;
}

.assignment-line{
  margin-top:8px;
  color:#ddd;
}

.muted{
  color:#aaa;
  font-size:.95rem;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:8px;
  border-bottom:1px solid #333;
  text-align:left;
}

#actionStatus{
  margin-top:10px;
  color:#bbb;
  white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="card">

<h1>NASCAR Pool Rebuild</h1>
<p class="small">Same frontend direction. New backend.</p>

<div class="controls">

<label>Race:</label>
<select id="raceSelect"></select>

<label>Tournament:</label>
<select id="tournamentSelect"></select>

<label>Round:</label>
<select id="roundSelect">
<option value="1">Round 1</option>
<option value="2">Round 2</option>
<option value="3">Round 3</option>
<option value="4">Round 4</option>
</select>

<button id="generateAssignmentsBtn">Generate Assignments</button>
<button id="importQualBtn">Import Qualifying</button>
<button id="importResultsBtn">Import Results</button>

</div>

<div id="actionStatus"></div>

<div id="status">Loading assignments...</div>
<div id="results"></div>

<h2>Swiss Matchups</h2>
<div id="matchups"></div>

<h2>Swiss Standings</h2>
<div id="standings"></div>

</div>

<script>

const SUPABASE_URL="https://adhqiqniqxwfcruwrlfh.supabase.co";
const SUPABASE_KEY="sb_publishable_6cZQmGc_Ceq_XfjfrxcdgA_YeAF5Pp8";
const ADMIN_KEY="BMurf1083!@";

const raceSelect=document.getElementById("raceSelect");
const tournamentSelect=document.getElementById("tournamentSelect");
const roundSelect=document.getElementById("roundSelect");

const generateAssignmentsBtn=document.getElementById("generateAssignmentsBtn");
const importQualBtn=document.getElementById("importQualBtn");
const importResultsBtn=document.getElementById("importResultsBtn");

const statusEl=document.getElementById("status");
const resultsEl=document.getElementById("results");
const actionStatusEl=document.getElementById("actionStatus");

const matchupsEl=document.getElementById("matchups");
const standingsEl=document.getElementById("standings");

async function loadRaces(){

const response=await fetch(`${SUPABASE_URL}/rest/v1/races?select=id,race_name,race_number,season_year&order=race_number.asc`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const races=await response.json();

raceSelect.innerHTML="";

races.forEach(r=>{
const o=document.createElement("option");
o.value=r.id;
o.textContent=`Race ${r.race_number}: ${r.race_name}`;
raceSelect.appendChild(o);
});

if(races.length){
await loadAssignments(raceSelect.value);
await loadScores(raceSelect.value);
}

}

async function loadTournaments(){

const response=await fetch(`${SUPABASE_URL}/rest/v1/tournaments?select=id,tournament_number,season_year&order=tournament_number`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data=await response.json();

tournamentSelect.innerHTML="";

data.forEach(t=>{
const o=document.createElement("option");
o.value=t.id;
o.textContent=`Tournament ${t.tournament_number} (${t.season_year})`;
tournamentSelect.appendChild(o);
});

}

async function loadAssignments(raceId){

statusEl.textContent="Loading assignments...";
resultsEl.innerHTML="";

const response=await fetch(`${SUPABASE_URL}/rest/v1/resolved_assignments?race_id=eq.${raceId}&select=*&order=player_name.asc,assignment_slot.asc`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data=await response.json();

if(!data.length){
statusEl.textContent="No assignments.";
return;
}

const players={};

data.forEach(r=>{
if(!players[r.player_name])players[r.player_name]=[];
players[r.player_name].push(r);
});

resultsEl.innerHTML=Object.entries(players).map(([name,a])=>{

a.sort((x,y)=>x.assignment_slot-y.assignment_slot);

return`
<div class="player-block">
<h3>${name}</h3>
${a.map(r=>`
<div class="assignment-line">
<strong>Driver ${r.assignment_slot}:</strong>
${r.driver_name??"Not resolved yet"}${r.car_number?` (#${r.car_number})`:""}
<div class="muted">Assigned qualifying position: ${r.qualifying_position}</div>
</div>
`).join("")}
</div>
`;

}).join("");

statusEl.textContent="";

}

async function loadScores(raceId){

const response=await fetch(`${SUPABASE_URL}/rest/v1/player_race_scores?race_id=eq.${raceId}&select=*&order=average_finish.asc.nullslast,player_name.asc`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data=await response.json();

if(!data.length)return;

resultsEl.innerHTML=data.map(r=>`
<div class="player-block">

<h3>${r.player_name}</h3>

<div class="assignment-line">
<strong>Driver 1:</strong>
${r.driver_1_name??"—"}${r.driver_1_car_number?` (#${r.driver_1_car_number})`:""}
<div class="muted">
Qual: ${r.driver_1_qualifying_position??"—"} | Finish: ${r.driver_1_finish??"—"}
</div>
</div>

<div class="assignment-line">
<strong>Driver 2:</strong>
${r.driver_2_name??"—"}${r.driver_2_car_number?` (#${r.driver_2_car_number})`:""}
<div class="muted">
Qual: ${r.driver_2_qualifying_position??"—"} | Finish: ${r.driver_2_finish??"—"}
</div>
</div>

<div style="margin-top:8px;color:#9ad">
<strong>Avg Finish:</strong> ${r.average_finish??"—"}
</div>

</div>
`).join("");

statusEl.textContent="";

}

async function loadSwissMatchups(){

const t=tournamentSelect.value;
const r=roundSelect.value;

if(!t)return;

const response=await fetch(`${SUPABASE_URL}/rest/v1/swiss_matchup_results?tournament_id=eq.${t}&round_number=eq.${r}&order=match_number`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data=await response.json();

if(!data.length){
matchupsEl.innerHTML="No matchups yet.";
return;
}

matchupsEl.innerHTML=data.map(m=>`
<div class="player-block">
<strong>Match ${m.match_number}</strong>
<div class="assignment-line">${m.player1_name} — Avg ${m.player1_avg??"-"}</div>
<div class="assignment-line">${m.player2_name} — Avg ${m.player2_avg??"-"}</div>
</div>
`).join("");

}

async function loadSwissStandings(){

const t=tournamentSelect.value;
if(!t)return;

const response=await fetch(`${SUPABASE_URL}/rest/v1/swiss_standings?order=wins.desc,avg_sum.asc`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data=await response.json();

if(!data.length){
standingsEl.innerHTML="No standings.";
return;
}

standingsEl.innerHTML=`
<table>
<tr>
<th>Player</th>
<th>W</th>
<th>L</th>
<th>Matches</th>
<th>Avg</th>
</tr>
${data.map(p=>`
<tr>
<td>${p.player_name}</td>
<td>${p.wins}</td>
<td>${p.losses}</td>
<td>${p.matches}</td>
<td>${p.avg??"-"}</td>
</tr>
`).join("")}
</table>
`;

}

raceSelect.addEventListener("change",async()=>{
await loadAssignments(raceSelect.value);
await loadScores(raceSelect.value);
});

tournamentSelect.addEventListener("change",async()=>{
await loadSwissMatchups();
await loadSwissStandings();
});

roundSelect.addEventListener("change",loadSwissMatchups);

generateAssignmentsBtn.addEventListener("click",async()=>{

const raceId=Number(raceSelect.value);

const response=await fetch("/api/generate-assignments",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-key":ADMIN_KEY
},
body:JSON.stringify({raceId})
});

await loadAssignments(raceId);
await loadScores(raceId);

});

importQualBtn.addEventListener("click",async()=>{

const raceId=Number(raceSelect.value);

await fetch("/api/import-qualifying",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-key":ADMIN_KEY
},
body:JSON.stringify({raceId})
});

await loadAssignments(raceId);
await loadScores(raceId);

});

importResultsBtn.addEventListener("click",async()=>{

const raceId=Number(raceSelect.value);

await fetch("/api/import-results",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-key":ADMIN_KEY
},
body:JSON.stringify({raceId})
});

await loadScores(raceId);

});

async function init(){

await loadRaces();
await loadTournaments();
await loadSwissMatchups();
await loadSwissStandings();

}

init();

</script>

</body>
</html>
