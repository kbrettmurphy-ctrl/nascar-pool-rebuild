<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASCAR Pool Rebuild</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #111;
      color: #f5f5f5;
    }

    .card {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #1b1b1b;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .small {
      color: #bbb;
    }

    .error {
      color: #ff8a8a;
      white-space: pre-wrap;
    }

    .race-block {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }

    .player-block {
      margin-top: 16px;
      padding: 14px;
      background: #222;
      border-radius: 10px;
      border: 1px solid #333;
    }

    .assignment-line {
      margin-top: 8px;
      color: #ddd;
    }

    .muted {
      color: #aaa;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NASCAR Pool Rebuild</h1>
    <p class="small">Resolved race assignments powered by Supabase.</p>

    <div id="status">Loading assignments...</div>
    <div id="results"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://adhqiqniqxwfcruwrlfh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_6cZQmGc_Ceq_XfjfrxcdgA_YeAF5Pp8";

    async function loadAssignments() {
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/resolved_assignments?select=*&order=season_year.asc,race_number.asc,player_name.asc,assignment_slot.asc`,
          {
            method: "GET",
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const data = await response.json();

        if (!data || data.length === 0) {
          status.textContent = "No assignments found.";
          return;
        }

        status.textContent = "";

        const races = {};

        data.forEach(row => {
          const raceKey = `${row.season_year}-${row.race_number}-${row.race_name}`;

          if (!races[raceKey]) {
            races[raceKey] = {
              race_name: row.race_name,
              race_number: row.race_number,
              season_year: row.season_year,
              players: {}
            };
          }

          if (!races[raceKey].players[row.player_name]) {
            races[raceKey].players[row.player_name] = [];
          }

          races[raceKey].players[row.player_name].push({
            assignment_slot: row.assignment_slot,
            qualifying_position: row.qualifying_position,
            driver_name: row.driver_name,
            car_number: row.car_number
          });
        });

        const raceHtml = Object.values(races).map(race => {
          const playerHtml = Object.entries(race.players).map(([playerName, assignments]) => {
            const sortedAssignments = assignments.sort((a, b) => a.assignment_slot - b.assignment_slot);

            return `
              <div class="player-block">
                <h3>${playerName}</h3>
                ${sortedAssignments.map(a => `
                  <div class="assignment-line">
                    <strong>Driver ${a.assignment_slot}:</strong>
                    ${a.driver_name ?? "Not resolved yet"}${a.car_number ? ` (#${a.car_number})` : ""}
                    <div class="muted">Assigned qualifying position: ${a.qualifying_position}</div>
                  </div>
                `).join("")}
              </div>
            `;
          }).join("");

          return `
            <div class="race-block">
              <h2>Race ${race.race_number}: ${race.race_name}</h2>
              ${playerHtml}
            </div>
          `;
        }).join("");

        results.innerHTML = raceHtml;
      } catch (err) {
        console.error(err);
        status.innerHTML = `<div class="error">Error: ${err.message || err}</div>`;
      }
    }

    loadAssignments();
  </script>
</body>
</html>
